name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'

    - name: Create Flutter Project Structure
      run: |
        flutter create . --org com.staticrig --project-name apptop1 --platforms=android

    - name: Force Compatible pubspec.yaml
      run: |
        cat << 'EOF' > pubspec.yaml
        name: apptop1
        description: "A brutalist force measurement utility."
        publish_to: "none"
        version: 1.0.0+1

        environment:
          sdk: '>=3.3.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter
          flutter_blue_plus: 1.32.1
          fl_chart: 0.68.0
          permission_handler: ^11.3.1

        dev_dependencies:
          flutter_test:
            sdk: flutter
          flutter_lints: ^3.0.0

        flutter:
          uses-material-design: true
        EOF

    - name: Fix Android Manifest Safely
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          cat << 'EOF' > "$MANIFEST_PATH"
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation"/>
            <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
            <uses-permission android:name="android.permission.BLUETOOTH"/>
            <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>
            <application
                android:label="apptop1"
                android:name="${applicationName}"
                android:icon="@mipmap/ic_launcher">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <meta-data
                      android:name="io.flutter.embedding.android.NormalTheme"
                      android:resource="@style/NormalTheme"
                      />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2" />
            </application>
        </manifest>
        EOF
        fi

    - name: Force Exact minSdkVersion
      run: |
        sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle

    - name: Inject Real BLE Data Stream App Code
      run: |
        cat << 'EOF' > lib/main.dart
        import 'dart:async';
        import 'dart:io';
        import 'package:flutter/material.dart';
        import 'package:flutter_blue_plus/flutter_blue_plus.dart';
        import 'package:fl_chart/fl_chart.dart';
        import 'package:permission_handler/permission_handler.dart';

        void main() {
          runApp(const StaticRigApp());
        }

        class StaticRigApp extends StatelessWidget {
          const StaticRigApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Static Rig Force',
              theme: ThemeData.dark().copyWith(
                scaffoldBackgroundColor: const Color(0xFF0A0A0A),
                primaryColor: Colors.white,
                colorScheme: const ColorScheme.dark(
                  surface: Color(0xFF141414),
                  primary: Colors.white,
                ),
              ),
              home: const ForceMonitorScreen(),
              debugShowCheckedModeBanner: false,
            );
          }
        }

        class ForceMonitorScreen extends StatefulWidget {
          const ForceMonitorScreen({super.key});

          @override
          State<ForceMonitorScreen> createState() => _ForceMonitorScreenState();
        }

        class _ForceMonitorScreenState extends State<ForceMonitorScreen> {
          bool _isScanning = false;
          List<ScanResult> _scanResults = [];
          BluetoothDevice? _connectedDevice;
          StreamSubscription<List<ScanResult>>? _scanSubscription;
          StreamSubscription<List<int>>? _valueSubscription;
          
          final List<FlSpot> _spots = [];
          double _timeCounter = 0;
          double _currentForce = 0.0;
          double _peakForce = 0.0;

          @override
          void initState() {
            super.initState();
            _requestPermissionsAndInit();
          }

          void _requestPermissionsAndInit() async {
            if (Platform.isAndroid) {
              await [
                Permission.bluetoothScan,
                Permission.bluetoothConnect,
                Permission.location,
              ].request();
            }
            
            _scanSubscription = FlutterBluePlus.scanResults.listen((results) {
              setState(() {
                _scanResults = results;
              });
            });
          }

          void _startScan() async {
            setState(() {
              _isScanning = true;
              _scanResults.clear();
            });
            
            try {
              if (Platform.isAndroid) {
                await FlutterBluePlus.turnOn();
              }
              await FlutterBluePlus.startScan(timeout: const Duration(seconds: 4));
            } catch (e) {
              debugPrint("Lỗi quét Bluetooth: $e");
            }
            
            setState(() {
              _isScanning = false;
            });
          }

          void _connectToDevice(BluetoothDevice device) async {
            await FlutterBluePlus.stopScan();
            setState(() {
              _connectedDevice = device;
            });

            try {
              await device.connect();
              List<BluetoothService> services = await device.discoverServices();
              for (var service in services) {
                if (service.uuid.toString() == "4fafc201-1fb5-459e-8fcc-c5c9c331914b") {
                  for (var characteristic in service.characteristics) {
                    if (characteristic.uuid.toString() == "beb5483e-36e1-4688-b7f5-ea07361b26a8") {
                      
                      _valueSubscription = characteristic.onValueReceived.listen((value) {
                        if (value.isNotEmpty) {
                          String decoded = String.fromCharCodes(value).replaceAll('\x00', '').trim();
                          double? parsedForce = double.tryParse(decoded);
                          
                          if (parsedForce != null) {
                            setState(() {
                              _currentForce = parsedForce;
                              if (_currentForce > _peakForce) _peakForce = _currentForce;
                              _timeCounter += 0.1;
                              _spots.add(FlSpot(_timeCounter, _currentForce));
