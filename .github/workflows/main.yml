name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# SỬA LỖI 1: Cấp quyền cho GitHub Actions có thể upload file lên Artifacts
permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4 # Cập nhật lên v4 cho ổn định
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'

    - name: Create Flutter Project Structure
      run: |
        flutter create . --org com.staticrig --project-name apptop1 --platforms=android

    - name: Force Compatible pubspec.yaml
      run: |
        cat << 'EOF' > pubspec.yaml
        name: apptop1
        description: "A new Flutter project."
        publish_to: "none"
        version: 1.0.0+1

        environment:
          sdk: '>=3.3.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter
          flutter_blue_plus: 1.32.1
          fl_chart: 0.68.0

        dev_dependencies:
          flutter_test:
            sdk: flutter
          flutter_lints: ^3.0.0

        flutter:
          uses-material-design: true
        EOF

    - name: Get Dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release --no-tree-shake-icons

    # SỬA LỖI 2: Thay đổi đường dẫn lấy file APK linh hoạt hơn để tránh lỗi không tìm thấy file
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/*.apk
